name: helena-agent

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**'
      - '.github/workflows/publish-ghcr.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**'
      - '.github/workflows/publish-ghcr.yaml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/helena-agent

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Tests
  # ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
      KEYCLOAK_ISSUER: https://keycloak.example.com/realms/test
      KEYCLOAK_JWKS_URL: https://keycloak.example.com/realms/test/protocol/openid-connect/certs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────
  # Job 2: Build & push image (only on push to main/develop)
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ vars.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false